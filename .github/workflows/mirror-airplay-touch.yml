name: Mirror airplay-touch cask to legacy tap

# Pushes Casks/airplay-touch.rb verbatim to jobtools/homebrew-airplay-touch
# whenever it changes here, so users still on the legacy tap (already covered
# by tap_migrations.json) keep getting upgrades until they migrate.
#
# Secret required:
#   LEGACY_TAP_PUSH_TOKEN — fine-grained PAT scoped to
#   jobtools/homebrew-airplay-touch with `contents: write`.

on:
  push:
    branches: [main]
    paths: ['Casks/airplay-touch.rb']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source tap
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout legacy tap
        uses: actions/checkout@v4
        with:
          repository: jobtools/homebrew-airplay-touch
          path: legacy
          token: ${{ secrets.LEGACY_TAP_PUSH_TOKEN }}

      - name: Sync cask file
        working-directory: legacy
        run: |
          mkdir -p Casks
          cp ../source/Casks/airplay-touch.rb Casks/airplay-touch.rb
          if git diff --quiet Casks/airplay-touch.rb; then
            echo "Cask already in sync — nothing to do."
            exit 0
          fi
          VERSION=$(sed -nE 's/.*version "([^"]+)".*/\1/p' Casks/airplay-touch.rb | head -1)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/airplay-touch.rb
          git commit -m "Mirror airplay-touch v${VERSION:-unknown} from homebrew-tap"
          git push
